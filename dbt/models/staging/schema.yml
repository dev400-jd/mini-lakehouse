version: 2

models:
  - name: stg_cdp_emissions
    description: "CDP-Emissionen bereinigt: Strings -> Typen, leere Strings -> NULL"
    columns:
      - name: company_name
        tests:
          - not_null
      - name: reporting_year
        tests:
          - not_null
      - name: isin
        description: "ISIN — WIRD FEHLSCHLAGEN: CDP hat Eintraege ohne ISIN"
        tests:
          - not_null
      - name: scope_1_tco2e
        description: "Scope 1 in tCO2e — KÖNNTE FEHLSCHLAGEN: CDP hat fehlende Werte"
        tests:
          - not_null

  - name: stg_nzdpu_emissions
    description: "NZDPU-Emissionen normalisiert auf gemeinsames Schema"
    columns:
      - name: company_name
        tests:
          - not_null
      - name: isin
        tests:
          - not_null
          - unique
