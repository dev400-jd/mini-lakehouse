services:

  minio:
    image: minio/minio:${MINIO_VERSION}
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - lakehouse-net

  postgres:
    image: postgres:${POSTGRES_VERSION}
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: nessie
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./config/postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d nessie"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - lakehouse-net

  nessie:
    image: ghcr.io/projectnessie/nessie:${NESSIE_VERSION}
    container_name: nessie
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${NESSIE_PORT}:19120"
    environment:
      # Version store: JDBC2 (JDBC ist in 0.99.0 deprecated)
      NESSIE_VERSION_STORE_TYPE: JDBC2
      NESSIE_VERSION_STORE_PERSIST_JDBC_DATASOURCE: postgresql
      # Quarkus named datasource "postgresql"
      QUARKUS_DATASOURCE_POSTGRESQL_JDBC_URL: jdbc:postgresql://postgres:5432/nessie
      QUARKUS_DATASOURCE_POSTGRESQL_USERNAME: ${POSTGRES_USER}
      QUARKUS_DATASOURCE_POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19120/api/v2/config"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - lakehouse-net

  trino:
    image: trinodb/trino:${TRINO_VERSION}
    container_name: trino
    depends_on:
      nessie:
        condition: service_healthy
    ports:
      - "${TRINO_PORT}:8080"
    volumes:
      - ./config/trino/catalog:/etc/trino/catalog:ro
      - ./config/trino/jvm.config:/etc/trino/jvm.config:ro
      - ./config/trino/config.properties:/etc/trino/config.properties:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/v1/info | grep -q '\"starting\":false' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - lakehouse-net

  spark-master:
    build:
      context: .
      dockerfile: spark/Dockerfile
    container_name: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "${SPARK_MASTER_WEBUI_PORT}:8080"
      - "${SPARK_MASTER_PORT}:7077"
    environment:
      SPARK_MASTER_HOST: spark-master
      SPARK_NO_DAEMONIZE: "true"
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      # AWS SDK v2 (iceberg-aws-bundle) erfordert eine Region — MinIO ignoriert den Wert
      AWS_REGION: us-east-1
    volumes:
      - ./config/spark/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf.template:ro
      - ./scripts:/scripts:ro
      - ./data:/data:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - lakehouse-net

  spark-worker:
    build:
      context: .
      dockerfile: spark/Dockerfile
    container_name: spark-worker
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      SPARK_WORKER_MEMORY: 2g
      SPARK_WORKER_CORES: "2"
      SPARK_NO_DAEMONIZE: "true"
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      AWS_REGION: us-east-1
    volumes:
      - ./config/spark/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf.template:ro
      - ./data:/data:ro
    restart: unless-stopped
    networks:
      - lakehouse-net

  jupyter:
    build:
      context: .
      dockerfile: jupyter/Dockerfile
      args:
        JUPYTER_VERSION: ${JUPYTER_VERSION}
    container_name: jupyter
    depends_on:
      spark-master:
        condition: service_healthy
      trino:
        condition: service_healthy
      nessie:
        condition: service_healthy
    ports:
      - "${JUPYTER_PORT}:8888"
    environment:
      JUPYTER_TOKEN: ${JUPYTER_TOKEN}
      JUPYTER_ENABLE_LAB: "yes"
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      AWS_REGION: us-east-1
      SPARK_CONF_DIR: /home/jovyan/spark-conf
      # MLflow-Tracking-Server (Service im selben Docker-Netz)
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - ./notebooks:/home/jovyan/notebooks
      - ./data:/home/jovyan/data:ro
      - ./config/spark/spark-defaults.conf:/home/jovyan/spark-defaults.conf.template:ro
      - ./dbt:/home/jovyan/dbt:rw
      - ./scripts:/scripts:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8888/api || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - lakehouse-net

  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: cloudbeaver
    depends_on:
      trino:
        condition: service_healthy
    ports:
      - "${CLOUDBEAVER_PORT}:8978"
    volumes:
      - cloudbeaver-data:/opt/cloudbeaver/workspace
      - ./config/cloudbeaver/initial-data-sources.conf:/opt/cloudbeaver/conf/initial-data-sources.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8978 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - lakehouse-net

  trino-init:
    image: trinodb/trino:${TRINO_VERSION}
    container_name: trino-init
    depends_on:
      trino:
        condition: service_healthy
    entrypoint: /bin/bash /scripts/init-schemas.sh
    volumes:
      - ./scripts:/scripts:ro
    restart: "no"
    networks:
      - lakehouse-net

  minio-init:
    image: minio/mc
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh /scripts/init-buckets.sh
    volumes:
      - ./scripts:/scripts:ro
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET_RAW: ${S3_BUCKET_RAW}
      S3_BUCKET_STAGING: ${S3_BUCKET_STAGING}
      S3_BUCKET_CURATED: ${S3_BUCKET_CURATED}
      S3_BUCKET_TRUSTED: ${S3_BUCKET_TRUSTED}
      S3_BUCKET_WAREHOUSE: ${S3_BUCKET_WAREHOUSE}
      S3_BUCKET_MLFLOW: ${S3_BUCKET_MLFLOW}
    restart: "no"
    networks:
      - lakehouse-net

  mlflow:
    build:
      context: .
      dockerfile: mlflow/Dockerfile
      args:
        MLFLOW_VERSION: ${MLFLOW_VERSION}
    container_name: mlflow
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${MLFLOW_DB}
      --artifacts-destination s3://${S3_BUCKET_MLFLOW}/
      --serve-artifacts
    ports:
      - "${MLFLOW_PORT}:5000"
    environment:
      # Artifact-Upload des Servers nach MinIO (S3-kompatibel)
      MLFLOW_S3_ENDPOINT_URL: ${MINIO_ENDPOINT}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_REGION: us-east-1
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - lakehouse-net
  model-api:
    build:
      context: ./model-api
    container_name: model-api
    ports:
      - "8000:8000"
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    depends_on:
      mlflow:
        condition: service_healthy
    networks:
      - lakehouse-net

  streamlit-app:
    build:
      context: ./streamlit-app
    container_name: streamlit-app
    ports:
      - "${STREAMLIT_PORT}:8501"
    environment:
      FASTAPI_URL: http://model-api:8000
      MLFLOW_TRACKING_URI: http://mlflow:5000
      TRINO_HOST: trino
      TRINO_PORT: "8080"
    depends_on:
      trino:
        condition: service_healthy
      mlflow:
        condition: service_healthy
      model-api:
        condition: service_started
    restart: unless-stopped
    networks:
      - lakehouse-net

networks:
  lakehouse-net:
    driver: bridge

volumes:
  minio-data:
  postgres-data:
  cloudbeaver-data:


