# =============================================================================
# spark-defaults.conf — Iceberg + Nessie + MinIO/S3A Konfiguration
#
# Dieses File ist ein Template. ${MINIO_ROOT_USER} und ${MINIO_ROOT_PASSWORD}
# werden beim Container-Start durch den Entrypoint per envsubst ersetzt.
# Die Werte kommen aus den Umgebungsvariablen die docker-compose setzt (.env).
# =============================================================================

# --- Iceberg Session Extensions ---
spark.sql.extensions                                    org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions

# --- Nessie als Iceberg Catalog ---
# Catalog-Name "nessie" ist frei wählbar — in Notebooks: spark.table("nessie.db.table")
spark.sql.catalog.nessie                                org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.nessie.type                           nessie
spark.sql.catalog.nessie.uri                            http://nessie:19120/api/v2
spark.sql.catalog.nessie.ref                            main
spark.sql.catalog.nessie.warehouse                      s3a://warehouse/
spark.sql.catalog.nessie.io-impl                        org.apache.iceberg.aws.s3.S3FileIO
spark.sql.catalog.nessie.s3.endpoint                    http://minio:9000
spark.sql.catalog.nessie.s3.path-style-access           true
spark.sql.catalog.nessie.s3.access-key-id               ${MINIO_ROOT_USER}
spark.sql.catalog.nessie.s3.secret-access-key           ${MINIO_ROOT_PASSWORD}
# AWS SDK v2 erfordert eine Region — MinIO ignoriert diesen Wert
spark.sql.catalog.nessie.s3.region                      us-east-1

# --- Hadoop S3A FileSystem (für s3a:// URI-Auflösung) ---
spark.hadoop.fs.s3a.impl                                org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.endpoint                            http://minio:9000
spark.hadoop.fs.s3a.access.key                          ${MINIO_ROOT_USER}
spark.hadoop.fs.s3a.secret.key                          ${MINIO_ROOT_PASSWORD}
spark.hadoop.fs.s3a.path.style.access                   true
spark.hadoop.fs.s3a.connection.ssl.enabled              false
