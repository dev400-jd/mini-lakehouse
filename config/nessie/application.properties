# =============================================================================
# Nessie Catalog (Iceberg-REST-Kompatibilitaet)
#
# Noetig fuer Clients, die die generische Apache-Iceberg-REST-API sprechen
# (DuckDB iceberg-Extension, pyiceberg "rest" Catalog-Typ) — im Gegensatz zu
# Spark/Trino, die Nessies natives Katalog-Protokoll ueber eigene
# Connector-Config nutzen (siehe notebooks/spark_init.py,
# config/trino/catalog/nessie.properties) und diese Datei nicht brauchen.
#
# Als gemountete Properties-Datei statt Docker-Compose-Environment-Variablen,
# weil die S3-Secret-Aufloesung ueber "urn:nessie-secret:quarkus:<name>" +
# <name>.name / <name>.secret bei Nessie 0.99.0 per Env-Var nicht zuverlaessig
# funktioniert (bekanntes Problem, vgl. projectnessie/nessie#11759) — als
# Properties-Datei funktioniert die gleiche Konfiguration nachweislich.
# =============================================================================

nessie.catalog.default-warehouse=warehouse
nessie.catalog.warehouses.warehouse.location=s3://warehouse/

nessie.catalog.service.s3.default-options.region=us-east-1
nessie.catalog.service.s3.default-options.endpoint=http://minio:9000
nessie.catalog.service.s3.default-options.path-style-access=true
nessie.catalog.service.s3.default-options.access-key=urn:nessie-secret:quarkus:s3creds

s3creds.name=lakehouse
s3creds.secret=lakehouse123
