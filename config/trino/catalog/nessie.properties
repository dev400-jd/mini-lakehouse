# =============================================================================
# Trino Iceberg Connector — Nessie Catalog + MinIO S3
# Geprüft für Trino 468 (Syntax: fs.native-s3, iceberg.nessie-catalog.*)
# =============================================================================

connector.name=iceberg
iceberg.catalog.type=nessie

# --- Nessie Catalog ---
# Trino 468 nutzt Nessie API v1 intern (Iceberg NessieCatalog Client)
iceberg.nessie-catalog.uri=http://nessie:19120/api/v1
iceberg.nessie-catalog.ref=main
iceberg.nessie-catalog.default-warehouse-dir=s3://warehouse/

# --- Native S3 FileSystem (Trino >= 430, ersetzt hive.s3.*) ---
fs.native-s3.enabled=true
s3.endpoint=http://minio:9000
s3.path-style-access=true
s3.region=us-east-1
s3.aws-access-key=lakehouse
s3.aws-secret-key=lakehouse123
